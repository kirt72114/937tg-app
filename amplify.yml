version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci
        - npx prisma generate
    build:
      commands:
        # Amplify exposes app env vars at build time only. Bake the server-only
        # vars into .env.production so Next.js includes them in the SSR bundle
        # that runs in the Amplify Lambda at runtime.
        - env | grep -E '^(DATABASE_URL|SUPABASE_SERVICE_ROLE_KEY)=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
